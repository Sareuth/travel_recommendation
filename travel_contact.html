<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Hollands Travel</title>
        <link rel="stylesheet" href="./travel.css">
    </head>
    <body>
        <nav>
            <div class="nav-left">
              <img src="./logo.png" alt="logo" class="logo">
              <h1>Hollands Travel</h1>
            </div>
          
            <ul class="nav-links">
              <li><a href="./travel_recommendation.html">Home</a></li>
              <li><a href="./travel_about.html">About Us</a></li>
              <li><a href="./travel_contact.html">Contact Us</a></li>
            </ul>
        </nav>
        <div id="main">
            <form id="contactForm">
                <div>
                  <label for="name">Name</label>
                  <input type="text" id="name" name="name" required>
                </div>
                <div>
                  <label for="email">Email</label>
                  <input type="email" id="email" name="email" required>
                </div>
                <div>
                  <label for="condition">Condition</label>
                  <input type="text" id="condition" name="condition" required>
                </div>
                <div>
                  <label for="message">Message</label>
                  <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" onclick="thankyou()">Submit</button>
              </form>
        </div>
    </body>
</html>
